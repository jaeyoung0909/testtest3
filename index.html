<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>청소 일정</title>
  <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.6;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }
    .status {
      margin-bottom: 16px;
      color: #666;
      white-space: pre-wrap;
    }
    .item {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .date {
      font-weight: 700;
      margin-bottom: 6px;
    }
    .time {
      color: #444;
    }
  </style>
</head>
<body>
  <h1>청소 일정</h1>
  <div id="status" class="status">불러오는 중...</div>
  <div id="list"></div>

  <script>
    const icsUrl = "https://www.airbnb.co.kr/calendar/ical/1645580986024161961.ics?t=53c9755b3fed47689ccf1ea5ebbea2a5";
    const proxyUrl =
      "https://api.allorigins.win/raw?url=" + encodeURIComponent(icsUrl);

    const DEFAULT_CHECKIN_HOUR = 15;   // 오후 3시
    const DEFAULT_CHECKOUT_HOUR = 11;  // 오전 11시

    const statusEl = document.getElementById("status");
    const listEl = document.getElementById("list");

    function cloneDate(d) {
      return new Date(d.getTime());
    }

    function setTime(date, hour, minute = 0) {
      const d = cloneDate(date);
      d.setHours(hour, minute, 0, 0);
      return d;
    }

    function formatDate(date) {
      return new Intl.DateTimeFormat("ko-KR", {
        month: "long",
        day: "numeric",
        weekday: "long"
      }).format(date);
    }

    function formatTime(date) {
      return new Intl.DateTimeFormat("ko-KR", {
        hour: "numeric",
        minute: "2-digit",
        hour12: true
      }).format(date);
    }

    function isDateOnly(icalTime) {
      return !!(icalTime && icalTime.isDate);
    }

    async function loadCalendar() {
      try {
        const res = await fetch(proxyUrl);
        if (!res.ok) {
          throw new Error("일정 파일을 불러오지 못했습니다: HTTP " + res.status);
        }

        const text = await res.text();
        const jcalData = ICAL.parse(text);
        const comp = new ICAL.Component(jcalData);
        const vevents = comp.getAllSubcomponents("vevent");

        const items = vevents.map(v => {
          const ev = new ICAL.Event(v);

          const startIcal = ev.startDate;
          const endIcal = ev.endDate;

          let checkin = startIcal.toJSDate();
          let checkout = endIcal.toJSDate();

          const startHasNoTime = isDateOnly(startIcal);
          const endHasNoTime = isDateOnly(endIcal);

          if (startHasNoTime) {
            checkin = setTime(checkin, DEFAULT_CHECKIN_HOUR, 0);
          }

          if (endHasNoTime) {
            checkout = setTime(checkout, DEFAULT_CHECKOUT_HOUR, 0);
          }

          return {
            checkin,
            checkout
          };
        });

        items.sort((a, b) => a.checkin - b.checkin);

        listEl.innerHTML = "";
        statusEl.textContent = "";

        if (items.length === 0) {
          statusEl.textContent = "표시할 일정이 없습니다.";
          return;
        }

        for (const item of items) {
          const div = document.createElement("div");
          div.className = "item";

          const dateDiv = document.createElement("div");
          dateDiv.className = "date";
          dateDiv.textContent =
            `${formatDate(item.checkin)} 입실 / ${formatDate(item.checkout)} 퇴실`;

          const timeDiv = document.createElement("div");
          timeDiv.className = "time";
          timeDiv.textContent =
            `입실 ${formatTime(item.checkin)} / 퇴실 ${formatTime(item.checkout)}`;

          div.appendChild(dateDiv);
          div.appendChild(timeDiv);
          listEl.appendChild(div);
        }
      } catch (err) {
        console.error(err);
        statusEl.textContent =
          "일정을 불러오지 못했습니다.\n" +
          "CORS 차단 또는 링크 만료일 수 있습니다.\n" +
          err.message;
      }
    }

    loadCalendar();
  </script>
</body>
</html>
