<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>청소 일정</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", "Segoe UI", sans-serif;
      background: #f7f7f8;
      color: #111827;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .header {
      margin-bottom: 16px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }

    .desc {
      margin: 0;
      color: #4b5563;
      font-size: 16px;
      line-height: 1.5;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }

    .calendar-wrap {
      position: relative;
      width: 100%;
      height: 78vh;
      min-height: 600px;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .footer {
      margin-top: 14px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      .container {
        padding: 16px 10px 24px;
      }

      .title {
        font-size: 24px;
      }

      .desc {
        font-size: 15px;
      }

      .calendar-wrap {
        height: 82vh;
        min-height: 520px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">📅 청소 일정</h1>
      <p class="desc">
        아래 캘린더에서 예약 일정을 확인해주세요.
      </p>
    </div>

    <div class="card">
      <div class="calendar-wrap">
        <iframe
          src="https://calendar.google.com/calendar/embed?src=cb240voofodpsclfsnfh00pbr5v1oh3p%40import.calendar.google.com&ctz=Asia%2FSeoul"
          frameborder="0"
          scrolling="no">
        </iframe>
      </div>
    </div>

    <div class="footer">
      일정이 바로 안 바뀌면 잠시 뒤 다시 확인해주세요.
    </div>
  </div>
</body>
</html>
